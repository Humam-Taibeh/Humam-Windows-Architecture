name: 🐛 Bug Report
description: Something broke, misbehaved, or failed to apply/restore correctly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        **Security vulnerabilities must NOT be reported here** — see [SECURITY.md](../blob/master/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug and what you expected instead.
      placeholder: When I clicked "Reset All Tweaks", the taskbar alignment was not restored…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch via start.bat
        2. Go to System Optimization → …
        3. Click …
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - GUI mode (start.bat / .exe)
        - Terminal mode (core.ps1 directly)
        - Both
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows version & build
      description: Run `winver` and copy the version and OS build.
      placeholder: Windows 11 Pro 24H2 (Build 26100.2314)
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version (GUI mode only)
      placeholder: "3.12.4"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste the relevant portion of `Desktop\HTCoreArchitecture_Log.txt`. This is auto-formatted as code.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this on the latest version of master
          required: true
